<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- building outline -->
  <rect x="10" y="20" width="44" height="36" rx="2" stroke="#00F5FF" stroke-width="2" fill="#00F5FF" fill-opacity="0.07"/>
  <!-- roof -->
  <polygon points="32,6 6,22 58,22" stroke="#00F5FF" stroke-width="2" stroke-linejoin="round" fill="#00F5FF" fill-opacity="0.12"/>
  <!-- door -->
  <rect x="27" y="40" width="10" height="16" rx="1" stroke="#00F5FF" stroke-width="1.6"/>
  <!-- windows -->
  <rect x="14" y="28" width="8" height="7" rx="1" stroke="#FFE600" stroke-width="1.4" fill="#FFE600" fill-opacity="0.2"/>
  <rect x="42" y="28" width="8" height="7" rx="1" stroke="#FFE600" stroke-width="1.4" fill="#FFE600" fill-opacity="0.2"/>
  <!-- star / event marker above -->
  <line x1="32" y1="2" x2="32" y2="5" stroke="#FF2D78" stroke-width="1.4" stroke-linecap="round"/>
</svg>
